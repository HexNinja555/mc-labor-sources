# MC Labor Sources — Supabase project config
# Link: supabase link --project-ref YOUR_PROJECT_REF
# Push:  supabase db push

project_id = "mc-labor-sources"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]

[storage]
enabled = true
file_size_limit = "50MiB"
